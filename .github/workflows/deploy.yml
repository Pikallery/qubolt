name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Backend → Cloud Run ──────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build & push Docker image
        working-directory: q-loop/backend
        run: |
          IMAGE="asia-south1-docker.pkg.dev/qubolt-new-2026/cloud-run-source-deploy/qubolt-api:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy qubolt-api \
            --image "$IMAGE" \
            --region asia-south1 \
            --project qubolt-new-2026 \
            --set-env-vars "DATABASE_URL=${{ secrets.NEON_DATABASE_URL }},DATABASE_URL_SYNC=${{ secrets.NEON_DATABASE_URL_SYNC }},SECRET_KEY=${{ secrets.APP_SECRET_KEY }},APP_ENV=production,GEMINI_API_KEY=AIzaSyBwyXwKHAlw7RkiebNbvl9h1s9Ux3kxWBg,GEMINI_API_KEY_FALLBACK=AIzaSyBh3mIz2jk172q6NOVpyLBiGWXdERXURgA,GEMINI_MODEL=gemini-2.0-flash,ACCESS_TOKEN_EXPIRE_MINUTES=480" \
            --quiet

  # ── Frontend → Firebase Hosting ─────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        working-directory: q-loop/frontend
        run: flutter build web --release --pwa-strategy none

      - name: Deploy to Firebase Hosting
        working-directory: q-loop/frontend
        run: |
          npm install -g firebase-tools@13
          firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project qubolt-app
