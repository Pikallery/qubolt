name: q_loop
description: Qubolt — Supply chain optimization for B2B logistics.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.7.0
  retrofit: ^4.4.1
  http: ^1.2.2

  # Auth / Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  intl: ^0.19.0
  timeago: ^3.7.0

  # Platform
  url_launcher: ^6.3.1
  file_picker: ^8.1.4

  # Firebase / FlutterFire (web-safe subset)
  # firebase_messaging and firebase_crashlytics excluded — no web support without service worker setup
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_analytics: ^11.3.3
  firebase_remote_config: ^5.1.3

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  retrofit_generator: ^9.1.5

flutter:
  uses-material-design: true
